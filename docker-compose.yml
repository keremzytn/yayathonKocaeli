# Test ortamı varsayılan: http://localhost:8083
# Port değiştirmek: WEB_PORT=3000 docker compose up -d
# Üretimde carmedlegal.com için önüne TLS terminasyonu (Traefik, Caddy, nginx vb.) koyun.
services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    network_mode: "host"
    restart: unless-stopped
    environment:
      - ASPNETCORE_URLS=http://+:8085
      - ConnectionStrings__DefaultConnection=Host=127.0.0.1;Port=5432;Database=yayathon_db;Username=postgres;Password=postgres;

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8083}:80"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
