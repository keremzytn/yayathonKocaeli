# Test ortamı varsayılan: http://localhost:8083
# Port değiştirmek: WEB_PORT=3000 docker compose up -d
# Üretimde carmedlegal.com için önüne TLS terminasyonu (Traefik, Caddy, nginx vb.) koyun.
services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    restart: unless-stopped
    environment:
      # Docker içinden host (ana makine) veritabanına bağlanabilmesi için host.docker.internal kullanıldı
      - ConnectionStrings__DefaultConnection=Host=host.docker.internal;Port=5432;Database=yayathon_db;Username=postgres;Password=postgres;

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8083}:80"
    restart: unless-stopped
