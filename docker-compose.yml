# Test ortamı varsayılan: http://localhost:8083
# Port değiştirmek: WEB_PORT=3000 docker compose up -d
# Üretimde carmedlegal.com için önüne TLS terminasyonu (Traefik, Caddy, nginx vb.) koyun.
services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-8083}:80"
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yayathon_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

