<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Kocaeli Yaya Ulaşımı Eylem Planı kapsamında Yayathon 2026 — İzmit ve Darıca için yaya odaklı fikir maratonu, 5–6 Haziran 2026."
    />
    <meta property="og:title" content="Yayathon 2026 | Kocaeli Büyükşehir Belediyesi" />
    <meta
      property="og:description"
      content="Yaya öncelikli kent için disiplinler arası hackathon. Başvuru, program ve kaynaklar."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://carmedlegal.com/" />
    <meta property="og:locale" content="tr_TR" />
    <!-- LCP hero görseli — arka plan CSS yerine <img> ile keşfediliyor -->
    <link rel="preload" as="image" href="/images/kocaeli.jpg" fetchpriority="high" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <title>Yayathon 2026 | Kocaeli Büyükşehir Belediyesi</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('yayathon-theme')
          var dark =
            t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
