# aaPanel: Bu dosyayı sunucuda şu yola kopyalayın (örnek domain carmedlegal.com):
#   /www/server/panel/vhost/nginx/extension/carmedlegal.com/docker_proxy.conf
#
# Sonra: nginx -t && nginx -s reload
#
# ^~  : Alttaki "location ~ .*\.(js|css)" gibi regex'lerin önüne geçer; tüm trafik Docker'a gider.

location ^~ / {
    proxy_pass http://127.0.0.1:8083;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
